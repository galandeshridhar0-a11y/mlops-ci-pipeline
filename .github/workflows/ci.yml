name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -q

      - name: Run data quality gate
        run: python src/data_check.py --fix

      - name: Run full ML pipeline
        run: python src/pipeline.py --n-estimators 10 --max-depth 2

      - name: Upload models artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: models
          path: models/*.pkl
          retention-days: 7

      - name: Upload mlruns artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/**
          retention-days: 7

      - name: List generated artifacts
        run: |
          echo "=== models directory ==="
          ls -R models || true
          echo "=== mlruns directory ==="
          ls -R mlruns || true

      - name: Create GitHub Release with artifacts
        if: always()
        uses: ncipollo/release-action@v1
        with:
          tag: pipeline-${{ github.run_number }}
          name: Pipeline artifacts - run ${{ github.run_number }}
          files: |
            models/**
            mlruns/**
          draft: false
          prerelease: false

      - name: Commit models and mlruns to repository
        if: "github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models || true
          git add mlruns || true
          git commit -m "ci: add pipeline artifacts (models + mlruns) [skip ci]" || echo "no changes to commit"
          git push origin HEAD:main || echo "push failed"
