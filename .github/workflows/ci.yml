name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -q

      - name: Run data quality gate
        run: python src/data_check.py --fix

      - name: Run full ML pipeline
        run: python src/pipeline.py --n-estimators 10 --max-depth 2

      - name: Upload models artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: models
          path: models/**

      - name: Upload mlruns artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/**

      - name: List generated artifacts
        run: |
          echo "=== models directory ==="
          ls -R models || true
          echo "=== mlruns directory ==="
          ls -R mlruns || true
